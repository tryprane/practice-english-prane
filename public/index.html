<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Practice English Prane - Private ephemeral communication channel">
  <meta name="theme-color" content="#0f1118">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prane">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Practice English Prane Chat</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="screen-container flex-center">
    <div class="layout-auth">
      <h1 class="title-main">Practice English Prane</h1>
      <p class="subtitle-main">Enter your room code to start practicing</p>
      
      <form id="join-form" class="card">
        <div class="input-group">
          <label class="input-label" for="room-code">Room Code</label>
          <input class="input-field" type="text" id="room-code" placeholder="E.G. A1B2C3" required autocomplete="off" style="text-transform: uppercase;">
        </div>
        
        <div class="input-group">
          <label class="input-label" for="user-name">Your Name</label>
          <input class="input-field" type="text" id="user-name" placeholder="John Doe" required autocomplete="off">
        </div>
        
        <button class="btn-primary" type="submit" style="margin-top: 8px;">Enter Channel</button>
      </form>
      
      <div class="flex-center" style="margin-top: 32px;">
        <a href="admin.html" class="link-btn">Admin Portal</a>
      </div>

      <div class="recent-rooms-container" style="display: none;" id="recent-rooms-section">
        <h3 class="recent-title">Recent Rooms</h3>
        <div class="recent-rooms-list" id="recent-rooms-list">
          <!-- Rooms will be injected here via JS -->
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
